<!DOCTYPE html>
<html>
    {% load staticfiles %}  <!-- enables django's { static %} tags -->
    <head>
        <title> {% block title_block %} <!-- the page title will go here--> {% endblock %} </title>
    </head>
    <body>

        <div>
            {% block body_block %} 
                <!-- the child templates will insert the page-specefic conetent here-->
            {% endblock %}
        </div>

        <div>
            <ul>
                    <!-- links generated using Django's { url%} tag -->
                    <li><a href="{% url 'marketplace:home' %}">Home Page</a></li>
                    <li><a href="{% url 'marketplace:search_page' %}">Search</a></li>

                    {% if user.is_authenticated %}
                    <li><a href="{% url 'marketplace:profile_page' %}">Profile</a></li>
                    <li><a href="{% url 'marketplace:sell_page' %}">Sell</a></li>
                    <li><a href="{% url 'marketplace:logout' %}">Logout</a></li>
                {% else %}
                    <li><a href="{% url 'marketplace:register' %}">Register</a></li>
                    <li><a href="{% url 'marketplace:login' %}">Login</a></li>
                {% endif %}

                <li><a href="{% url 'admin:index' %}">Admin</a></li> <!-- delete once dev is done-->
            </ul>
            </ul>
        </div>
    </body>


</html>
